version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: recipe-db
    restart: always
    environment:
      POSTGRES_DB: recipe_db
      POSTGRES_USER: recipe_user
      POSTGRES_PASSWORD: recipe_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recipe_user -d recipe_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: recipe-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: development
      DB_DIALECT: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: recipe_db
      DB_USER: recipe_user
      DB_PASSWORD: recipe_password
      DB_LOGGING: "true"
      DB_FORCE_SYNC: "false"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
